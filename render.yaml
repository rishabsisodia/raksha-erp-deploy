services:
  - type: web
    name: raksha-erp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

databases:
  - name: raksha-erp-db
    plan: paid
    databaseName: raksha_erp
